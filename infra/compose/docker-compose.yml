name: contabilpro

services:
  postgres:
    image: postgres:16-alpine
    container_name: contabilpro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: contabilpro
      POSTGRES_PASSWORD: contabilpro
      POSTGRES_DB: contabilpro
      TZ: America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contabilpro"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: contabilpro-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: contabilpro-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: contabilpro-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/contabilpro || true;
      mc anonymous set download local/contabilpro || true;
      exit 0;
      "

  mailhog:
    image: mailhog/mailhog:latest
    container_name: contabilpro-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
